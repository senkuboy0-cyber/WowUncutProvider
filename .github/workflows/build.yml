name: Build & Deploy CloudStream Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.13

      - name: Build Extensions
        run: gradle make

      - name: Show built files
        run: find . -name "*.cs3" -o -name "plugins.json" 2>/dev/null

      - name: Prepare builds folder
        run: |
          mkdir -p builds
          cp repo.json builds/
          find . -name "*.cs3" -exec cp {} builds/ \;
          find . -name "plugins.json" ! -path "./builds/*" -exec cp {} builds/ \;

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: builds
          clean: true
